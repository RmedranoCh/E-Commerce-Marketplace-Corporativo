# =========================================================================
# TECHMARKET CORE GATEWAY — CONFIGURACIÓN PERIMETRAL DE NGINX
# =========================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # =========================================================================
    # 1. OPTIMIZACIÓN DE ASIGNACIÓN DE MEMORIA RAM Y CAPACIDAD BINARIA
    # =========================================================================
    client_max_body_size        32M;
    client_body_buffer_size     16M;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;
    client_body_timeout   60s;
    client_header_timeout 60s;
    keepalive_timeout     65s;
    keepalive_requests    100;

    # =========================================================================
    # 2. POLÍTICA DE COMPRESIÓN DINÁMICA GZIP (ACELERACIÓN EN MÓVILES)
    # =========================================================================
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # =========================================================================
    # 3. ENRUTAMIENTO DE SUBREDES DE LA MALLA DE SERVICIOS
    # =========================================================================
    server {
        listen       80;
        server_name  localhost;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://web-frontend:8002;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        location /api/auth/ {
            proxy_pass http://auth-service:5000;
        }

        location /api/orders/ {
            proxy_pass http://order-service:8000;
        }

        # =========================================================================
        # 4. RUTA CRÍTICA MULTIMEDIA: DESPACHO DESDE EL VOLUMEN COMPARTIDO
        # =========================================================================
        location /media/ {
            alias /app/media/; 
            autoindex off;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            include /etc/nginx/mime.types;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}